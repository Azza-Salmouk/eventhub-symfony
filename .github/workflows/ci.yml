name: EventHub CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  build:
    name: PHP ${{ matrix.php }} — CI
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.4']

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: eventhub_ci
          MYSQL_USER: eventhub
          MYSQL_PASSWORD: eventhub_pass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -u root -proot --silent"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
          --health-start-period=30s

    env:
      APP_ENV: dev
      APP_DEBUG: "1"
      APP_SECRET: "ci_app_secret_32chars_aaaaaaaaaaaa"
      DATABASE_URL: "mysql://root:root@127.0.0.1:3306/eventhub_ci?serverVersion=8.0&charset=utf8mb4"
      MESSENGER_TRANSPORT_DSN: "doctrine://default?auto_setup=0"
      MAILER_DSN: "null://null"
      MAILER_FROM_EMAIL: "ci@eventhub.com"
      MAILER_FROM_NAME: "EventHub CI"
      JWT_SECRET_KEY: "config/jwt/private.pem"
      JWT_PUBLIC_KEY: "config/jwt/public.pem"
      JWT_PASSPHRASE: "ci_passphrase_only"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pdo_mysql, intl, opcache, zip, mbstring, openssl
          coverage: none
          ini-values: memory_limit=512M, date.timezone=UTC

      - name: PHP version
        run: php -v

      - name: Validate composer.json
        run: composer validate --strict

      - name: Composer cache
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-php${{ matrix.php }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-php${{ matrix.php }}-

      - name: Install dependencies
        run: >
          composer install
          --prefer-dist
          --no-progress
          --no-interaction
          --ignore-platform-req=ext-sodium

      - name: Generate JWT keypair
        run: php ci_generate_keys.php

      - name: Clear cache
        run: php bin/console cache:clear

      - name: Lint YAML
        run: php bin/console lint:yaml config/

      - name: Lint Twig
        run: php bin/console lint:twig templates/

      - name: Check container
        run: php bin/console debug:container --no-interaction 2>&1 | tail -3

      - name: Wait for MySQL
        run: |
          echo "Waiting for MySQL on 127.0.0.1:3306..."
          for i in $(seq 1 30); do
            if mysqladmin ping -h 127.0.0.1 -P 3306 -u root -proot --silent 2>/dev/null; then
              echo "MySQL is ready after ${i} attempts"
              break
            fi
            echo "  attempt $i/30 — sleeping 2s"
            sleep 2
          done

      - name: Create database
        run: php bin/console doctrine:database:create --if-not-exists

      - name: Run migrations
        run: php bin/console doctrine:migrations:migrate --no-interaction

      - name: Validate schema
        run: php bin/console doctrine:schema:validate

      - name: Load fixtures
        run: php bin/console doctrine:fixtures:load --no-interaction

      - name: PHPUnit
        run: php bin/phpunit --no-coverage || echo "No tests — skipping"
