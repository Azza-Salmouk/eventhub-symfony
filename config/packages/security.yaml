security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: username

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false

        # ── Passkey endpoints — session-based, NO JWT, always returns JSON ────
        # Must be declared BEFORE the `api` firewall so LexikJWT never
        # intercepts /passkey-api/* and never returns an HTML redirect.
        passkey:
            pattern: ^/passkey-api/
            stateless: false
            lazy: true
            provider: app_user_provider

        # ── JWT login (issues token) ──────────────────────────────────────────
        api_login:
            pattern: ^/api/login$
            stateless: true
            provider: app_user_provider
            json_login:
                check_path: /api/login
                username_path: username
                password_path: password
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure

        # ── JWT refresh ───────────────────────────────────────────────────────
        api_refresh:
            pattern: ^/api/refresh$
            stateless: true
            refresh_jwt: ~

        # ── All other /api/* — stateless JWT ─────────────────────────────────
        api:
            pattern: ^/api
            stateless: true
            jwt: ~

        # ── Web (session-based) ───────────────────────────────────────────────
        main:
            lazy: true
            provider: app_user_provider
            form_login:
                login_path: app_admin_login
                check_path: app_admin_login
                default_target_path: app_admin_dashboard
                username_parameter: _username
                password_parameter: _password
            logout:
                path: app_logout
                target: app_home
            remember_me:
                secret: '%kernel.secret%'
                lifetime: 604800

    access_control:
        # Public API endpoints
        - { path: ^/api/login$,   roles: PUBLIC_ACCESS }
        - { path: ^/api/refresh$, roles: PUBLIC_ACCESS }

        # Passkey endpoints — public, controller enforces ROLE_ADMIN internally
        - { path: ^/passkey-api/, roles: PUBLIC_ACCESS }

        # Protected API endpoints
        - { path: ^/api/me,    roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/api/admin, roles: ROLE_ADMIN }

        # Admin web area
        - { path: ^/admin/login$,    roles: PUBLIC_ACCESS }
        - { path: ^/passkey/login,   roles: PUBLIC_ACCESS }
        - { path: ^/admin,           roles: ROLE_ADMIN }

        # Legacy /login redirect
        - { path: ^/login, roles: PUBLIC_ACCESS }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
